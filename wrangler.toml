name = "inference-gate"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

[observability.logs]
enabled = false
invocation_logs = true

[assets]
directory = "./public"

[ai]
binding = "AI"

[[durable_objects.bindings]]
name = "DOX402"
class_name = "InferenceGate"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["InferenceGate"]

[[kv_namespaces]]
binding = "WALLET_REGISTRY"
id = "4882d8452d0742a09defeff4826a5ad1"

[[vectorize]]
binding = "VECTORIZE"
index_name = "rag-index"

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "dox402_events"

[[r2_buckets]]
binding = "RAG_STORAGE"
bucket_name = "dox402-rag-storage"

[vars]
NETWORK = "base-mainnet"
PAYMENT_ADDRESS = "0x24AF3AcF8A91f5185e8CfB28087E2C54d49785B1" # overridden by secret in production

# BASE_RPC_URL is set as a wrangler secret (not a var) to avoid binding name conflicts.
# To update: npx wrangler secret put BASE_RPC_URL
# Do NOT set MOCK_PAYMENTS as a secret — absence = Tier 2 enforcement in production
# SESSION_SECRET — HMAC key for SIWE session tokens. Set via: npx wrangler secret put SESSION_SECRET
# Generate with: openssl rand -hex 32
# ADMIN_SECRET — Bearer token for admin endpoints. Set via: npx wrangler secret put ADMIN_SECRET
# Generate with: openssl rand -hex 32
